<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz Loca</title>

    <!-- Estilos principales de la interfaz. -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

   <div class="app">
    <!-- Encabezado y descripcion general de la aplicacion. -->
    <h1>🎙️ Voz Loca</h1>
    <p>Transformá tu voz con efectos divertidos.</p>

    <!-- Controles de grabacion y administracion del audio. -->
    <div class="controls">
        <button id="btnGrabar">🎤 Grabar</button>
        <button id="btnDetener" disabled>⏹️ Detener</button>
        <button id="btnBorrar" disabled>🗑️ Borrar audio</button>
    </div>

    <p id="estado">Listo para grabar</p>

    <audio id="audioOriginal" controls></audio>
    
</div>

<!-- Logica de grabacion y reproduccion. -->
<script src="js/app.js"></script>
</body>
</html>
